name: RU2 Build

on:
  workflow_dispatch:
  push:
    paths:
      - 'ru2/**'

jobs:
  build-ru2:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build RU2
        run: mvn -pl ru2 -am clean install

      - uses: actions/upload-artifact@v4
        with:
          name: ru2-artifact
          path: ru2/target/
